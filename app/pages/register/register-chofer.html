<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="../styleTemp.css">

</head>
<body>
    <div class="container-main">
        <h2 class="tittle">Registro Chofer</h2>
        <h2 class="tittle">Datos Personales</h2>

        <form action="" id="login-form">
            <label for="nombres">Nombres:</label>
            <input type="text" id="nombres" name="nombres" required>

            <label for="apellidos">Apellidos:</label>
            <input type="text" id="apellidos" name="apellidos" required>

            <label for="cedula">Cédula de Identidad:</label>
            <input type="text" id="cedula" name="cedula" pattern="[0-9]+" title="Solo números" required>

            <label for="tel">Teléfono Celular:</label>
            <input type="tel" name="tel" id="tel">
            
            <label for="email">Correo Electrónico:</label>
            <input type="email" name="email" id="email">
            
            <label for="password">Contraseña:</label>
            <input type="password" name="password" id="password">

            <button type="submit">Registrarse</button>

            <h2 class="tittle">Contactos de emergencia</h2>
            <!-- Contacto 1 -->
            <label for="nombre_emergencia_1">Nombre del Contacto 1:</label>
            <input type="text" id="nombre_emergencia_1" name="nombre_emergencia_1" required>
            <label for="tel_emergencia_1">Teléfono 1:</label>
            <input type="tel" id="tel_emergencia_1" name="tel_emergencia_1" required>

            <!-- Contacto 2 -->
            <label for="nombre_emergencia_2">Nombre del Contacto 2:</label>
            <input type="text" id="nombre_emergencia_2" name="nombre_emergencia_2" required>
            <label for="tel_emergencia_2">Teléfono 2:</label>
            <input type="tel" id="tel_emergencia_2" name="tel_emergencia_2" required>

            <p class = "error escondido">Error al registrase</p>
        </form>
        <p>¿Ya tienes una cuenta? <a href="/login-cliente">Logeate</a></p>
    </div>

</body>
</html>
