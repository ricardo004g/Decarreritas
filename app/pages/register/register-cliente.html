<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="./styleTemp.css">

</head>
<body>
    <div class="container-main">
        <h2 class="tittle">Registro Cliente</h2>
        <form action="" id="form">
            <label for="name">Nombre:</label>
            <input type="text" name="name" id="name">

            <label for="id">Cédula de Identidad:</label>
            <input type="text" name="CI" id="CI">

            <label for="tel">Teléfono Celular:</label>
            <input type="tel" name="tel" id="tel">
            
            <label for="email">Correo Electrónico:</label>
            <input type="email" name="email" id="email">
            
            <label for="password">Contraseña:</label>
            <input type="password" name="password" id="password">

            <button type="submit">Registrarse</button>

            <p class = "error escondido">Error al registrase</p>
        </form>
        <p>¿Ya tienes una cuenta? <a href="/login-cliente">Logeate</a></p>
    </div>
</body>
</html>
