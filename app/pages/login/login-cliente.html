<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../styleTemp.css">
    <script src="/login-cliente.js" defer></script>
</head>
<body>
    <div class="container-main">

        <h2 class="tittle">Cliente</h2>

        <form action="" id="login-form">

            <label for="password">Password</label>

            <button type="submit">Empezar</button>
            <p class = "error escondido">Error al iniciar sesión</p>
        </form>
        <p>¿Todavía no tienes una cuenta? <a href="/register-cliente">Registrate</a></p>
    </div>

</body>
